name: R Data Update and package compilation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'  # Runs day 1 in month

permissions:
  contents: write

jobs:
  Download-data-Compile-Commit:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'automatic updates') }}
    runs-on: ubuntu-24.04
    env:
      TZ: "Africa/Nairobi"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Pandoc
      uses: r-lib/actions/setup-pandoc@v2

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.0'

    - name: Install sf system libraries
      run: |
        sudo apt-get update -qq
        sudo apt-get install --yes --no-install-recommends \
          libudunits2-dev \
          libgdal-dev \
          libgeos-dev \
          libproj-dev \
          libsqlite3-dev

    - name: Restore locked application packages
      uses: r-lib/actions/setup-renv@v2
      env:
        GITHUB_PAT: ${{secrets.GH_PAT }}
      with:
        cache-version: 1

    - name: Configure workflow-only R library
      run: |
        mkdir -p "$RUNNER_TEMP/workflow-library"
        echo "WORKFLOW_R_LIBRARY=$RUNNER_TEMP/workflow-library" >> "$GITHUB_ENV"
        echo "RENV_CONFIG_EXTERNAL_LIBRARIES=$RUNNER_TEMP/workflow-library" >> "$GITHUB_ENV"

    - name: Install workflow-only packages
      env:
        GITHUB_PAT: ${{ secrets.GH_PAT }}
      run: R_LIBS_SITE="$WORKFLOW_R_LIBRARY" R_LIBS_USER="$WORKFLOW_R_LIBRARY" Rscript --vanilla dev/install_workflow_packages.R

    - name: Refresh food-price data
      run: Rscript data-raw/my_dataset.R

    - name: Refresh rainfall and vegetation data
      run: Rscript data-raw/climate_dataset.R

    - name: Build and Check the package
      run: |
        Rscript -e "devtools::build()"
        Rscript -e "devtools::install()"

    - name: Run RMD
      run: |
        Rscript -e "rmarkdown::render('README.Rmd', output_format = 'github_document')"

    - name: Validate locked deployment dependencies
      run: |
        Rscript -e "tool_library <- normalizePath(Sys.getenv('WORKFLOW_R_LIBRARY')); libraries <- normalizePath(.libPaths()); stopifnot(tool_library %in% libraries, match(tool_library, libraries) > 1L); rsconnect::appDependencies('.', dependencyResolution = 'strict')"

    - name: Commit files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git config pull.rebase false
        git pull origin main
        date=$(date +'%Y-%m-%d')
        git add .
        git commit -m "automatic updates $date" || echo "Nothing to update"

    - name: Push updated data
      uses: ad-m/github-push-action@master
      with:
          github_token: ${{ secrets.GH_PAT}}
          branch: main

    - name: Deploy Shiny App
      env:
        RS_CONNECT_TOKEN: ${{ secrets.RS_CONNECT_TOKEN }}
        RS_CONNECT_SECRET: ${{ secrets.RS_CONNECT_SECRET }}
      run: Rscript dev/deploy.R
