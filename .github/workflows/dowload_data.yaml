name: R Data Update and package compilation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'  # Runs day 1 in month

permissions:
  contents: write

jobs:
  Download-data-Compile-Commit:
    runs-on: ubuntu-24.04
    env:
      TZ: "Africa/Nairobi"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Pandoc
      uses: r-lib/actions/setup-pandoc@v2

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.0'
        use-public-rspm: true

    - name: Install and cache R packages
      uses: r-lib/actions/setup-r-dependencies@v2
      env:
        GITHUB_PAT: ${{secrets.GH_PAT }}
      with:
        cache-version: 2
        extra-packages: |
          any::checkhelper
          any::devtools
          any::ggthemes
          any::remotes
          any::rsconnect
          any::sf
          any::stringr
          any::usethis
          github::dickoa/rhdx

    - name: Run R script
      run: |
        Rscript data-raw/my_dataset.R

    - name: Build and Check the package
      run: |
        Rscript -e "devtools::build()"
        Rscript -e "devtools::install()"

    - name: Run RMD
      run: |
        Rscript -e "rmarkdown::render('README.Rmd', output_format = 'github_document')"

    - name: Commit files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git config pull.rebase false
        git pull origin main
        date=$(date +'%Y-%m-%d')
        git add .
        git commit -m "automatic updates $date" || echo "Nothing to update"

    - name: Push updated data
      uses: ad-m/github-push-action@master
      with:
          github_token: ${{ secrets.GH_PAT}}
          branch: main

    - name: Install kenyaFoodPrices package
      env:
        GITHUB_PAT: ${{secrets.GH_PAT }}
      run: |
        Rscript -e "remotes::install_github('m-mburu/kenyaFoodPrices')"

    - name: Pin terra for shinyapps.io GDAL
      run: |
        Rscript -e "remotes::install_version('terra', version = '1.8-93', repos = 'https://cran.r-project.org', upgrade = 'never')"

    - name: Deploy Shiny App
      env:
        RS_CONNECT_TOKEN: ${{ secrets.RS_CONNECT_TOKEN }}
        RS_CONNECT_SECRET: ${{ secrets.RS_CONNECT_SECRET }}
      run: Rscript dev/deploy.R
